[book]
title = "AgenticBlockTransfer (abt) Documentation"
authors = ["nervosys"]
description = "Comprehensive documentation for the abt disk imaging tool"
language = "en"
src = "src"

[build]
build-dir = "book"
create-missing = false

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/nervosys/AgenticBlockTransfer"
edit-url-template = "https://github.com/nervosys/AgenticBlockTransfer/edit/main/docs/{path}"
site-url = "/AgenticBlockTransfer/"
