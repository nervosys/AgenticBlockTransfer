ShortDescription: Agentic-first CLI successor to dd; human-first GUI/TUI successor to Etcher, Rufus, Ventoy
Description: |-
  AgenticBlockTransfer (abt) is a cross-platform disk image writer with CLI, TUI, and GUI modes.
  It provides safe, verified block-level writes with AI-discoverable ontology, multi-format support
  (ISO, IMG, QCOW2, VHD, VMDK, WIM), auto-decompression, device cloning, secure erase, and more.
